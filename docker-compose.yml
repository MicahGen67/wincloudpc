version: '3'
services:
  windows:
    image: dockur/windows
    container_name: windows
    environment:
      VERSION: "10"
      RAM_SIZE: "6G"
      CPU_CORES: "4"
    devices:
      - /dev/kvm
    cap_add:
      - NET_ADMIN
    ports:
      - "8006:8006"
      - "3389:3389/tcp"
    stop_grace_period: 2m
    volumes:
      - win_data:/storage

volumes:
  win_data:
